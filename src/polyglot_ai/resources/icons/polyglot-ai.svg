<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f"/>
      <stop offset="100%" style="stop-color:#0d8a6a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="24" y="24" width="464" height="464" rx="88" ry="88"
        fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Terminal bracket > -->
  <path d="M 140 170 L 260 256 L 140 342"
        fill="none" stroke="url(#accent)" stroke-width="36"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor _ (blinking block) -->
  <rect x="290" y="310" width="90" height="32" rx="4" ry="4" fill="url(#accent)"/>

  <!-- Three dots representing multiple providers -->
  <circle cx="310" cy="200" r="14" fill="#10a37f" opacity="0.9"/>
  <circle cx="355" cy="200" r="14" fill="#e57373" opacity="0.9"/>
  <circle cx="400" cy="200" r="14" fill="#569cd6" opacity="0.9"/>
</svg>

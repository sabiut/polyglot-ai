name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt system dependencies
        # libpulse0 + libxslt1.1 are pulled in for QtMultimedia /
        # QtWebEngine respectively — without them the module-level
        # imports in video_preview.py would short-circuit to the
        # "no preview available" stub on CI and the multimedia
        # tests would be skipped silently. Installing the libs
        # lets CI exercise the full feature surface that ships in
        # the .deb / .rpm / AppImage releases.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libfontconfig1 libdbus-1-3 \
            libpulse0 libxslt1.1 \
            >/dev/null 2>&1

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -x -q

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          python -c "from polyglot_ai import __version__; print(f'Version: {__version__}')"

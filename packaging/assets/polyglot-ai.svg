<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="88" ry="88"
        fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Terminal bracket > -->
  <path d="M 120 160 L 256 260 L 120 360"
        fill="none" stroke="#10a37f" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore cursor -->
  <rect x="280" y="328" width="120" height="32" rx="6" fill="#10a37f"/>

  <!-- Three provider dots -->
  <circle cx="300" cy="180" r="20" fill="#10a37f"/>
  <circle cx="356" cy="180" r="20" fill="#e57373"/>
  <circle cx="412" cy="180" r="20" fill="#569cd6"/>
</svg>
